name: backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      db:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: karier
          POSTGRES_PASSWORD: karier
          POSTGRES_DB: karier
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U karier -d karier"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://karier:karier@localhost:5432/karier
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install deps
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Migrate
        run: alembic upgrade head

      - name: Test
        run: pytest -q

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git pull --ff-only origin main
            cd backend
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
