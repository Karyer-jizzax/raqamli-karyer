# Production stack — backend + PostGIS on a single VPS.
# Run from the backend/ directory on the server:
#   docker compose -f docker-compose.prod.yml up -d --build
# The backend container runs `alembic upgrade head` before starting uvicorn.
services:
  db:
    image: postgis/postgis:16-3.4
    container_name: karier-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-karier}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-karier}
    volumes:
      - karier_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-karier} -d ${POSTGRES_DB:-karier}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: karier-backend:latest
    container_name: karier-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    # Bound to localhost only — nginx terminates TLS and proxies to it.
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - karier_media:/app/media
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'"

volumes:
  karier_pgdata:
  karier_media:
