services:
  db:
    image: postgis/postgis:16-3.4
    container_name: karier-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-karier}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-karier}
      POSTGRES_DB: ${POSTGRES_DB:-karier}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - karier_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-karier} -d ${POSTGRES_DB:-karier}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: karier-pgadmin
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@karier.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  karier_pgdata:
